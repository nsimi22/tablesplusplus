name: Release

# Builds signed installers for macOS, Windows, and Linux and publishes them — plus the
# `latest.json` the in-app updater reads — to a GitHub Release. Triggered by pushing a tag
# like `v0.3.0`, or run manually from the Actions tab with a `tag` input (e.g. `v0.3.0`) — in
# which case the tag is created on the selected commit. Either way the tag must match the app
# version in the manifests (a guard enforces this), so a manual run can't mislabel the release.
#
# NEVER dispatch with the tag of an ALREADY-PUBLISHED release: it rebuilds and re-uploads the
# assets onto the live release, and the matrix jobs' latest.json merge can race — a 2026-06-07
# dispatch did this to v0.3.0, leaving a stale darwin signature in latest.json and breaking
# updater signature verification for every installed app. Fix a bad release with a new patch
# tag instead.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           Tauri updater private key (minisign). Must match the
#                                       `plugins.updater.pubkey` in src-tauri/tauri.conf.json.
#                                       Generate with: npm run tauri signer generate
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  Password for that key (empty string if none).
#
# Optional OS code-signing (so installers aren't flagged by Gatekeeper/SmartScreen):
#   macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#            APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   Windows: configure a signing command via tauri.conf.json `bundle.windows.signCommand`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (must match the app version, e.g. v0.3.0)"
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    # The release tag: the pushed tag for tag events, or the manual input for a dispatched run.
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Fail fast (before the long build) if the tag doesn't match the version in the manifests,
      # so a manual run from a branch can't publish a mislabeled release.
      - name: Verify release tag matches the app version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::No release tag resolved. Push a v* tag, or run the workflow with a 'tag' input."
            exit 1
          fi
          if [ "${RELEASE_TAG}" != "v${version}" ]; then
            echo "::error::Tag '${RELEASE_TAG}' does not match package.json version 'v${version}'. Bump the version in package.json, src-tauri/Cargo.toml and src-tauri/tauri.conf.json, or use the matching tag."
            exit 1
          fi
          echo "Releasing ${RELEASE_TAG} (matches package.json v${version})."

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            build-essential libssl-dev libxdo-dev pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing/notarization (optional — omit to ship unsigned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # On a manual dispatch this tag is created on the checked-out commit.
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Tables++ ${{ env.RELEASE_TAG }}"
          releaseBody: "Download the installer for your platform below."
          # Publish immediately — no draft step. Note: the release is public as soon as the
          # first platform job creates it; the other platforms' assets land minutes later.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
