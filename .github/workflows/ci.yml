name: CI

# Runs the same quality gates the project uses locally on every PR and push to main:
# frontend type-check / lint / build, and Rust fmt / clippy / test.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            build-essential libssl-dev libxdo-dev pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (with fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # ---- Frontend gates ----
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build frontend
        run: npm run build # also produces dist/, which the Rust crate embeds via generate_context!

      # ---- Rust gates ----
      - name: Rust format
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        working-directory: src-tauri
        run: cargo test
